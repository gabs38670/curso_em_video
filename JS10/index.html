<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        #area{
            font: normal 20pt Arial;
            background: rgb(42,139,42) ;
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- colanco o evento de click direto no HTML -->
     <!-- Colocando o evento de mouse direto no HTML -->
    <div id="area" onclick="clicar()" onmouseenter="entrar()" onmouseout="sair()">
        Interaja
    </div>
    <button id="btn">Click</button>

    <script>
       
        /*
        Forma que não precissa chamar o evento no HTML 
        */
     
        // a.addEventListener('click', clicar)
        // a.addEventListener('mouseenter', entrar)
        // a.addEventListener('mouseout', sair)

         /*
        A function em um bloco que executa um código dentro dela
        nesta primeira versão estão chamando o evento no html 
        */
        function clicar (){
            var a = window.document.getElementById('area')
            a.innerText = 'Clicou!'
            a.style.background = 'red'

        }

        function entrar (){
            var a = document.getElementById('area')
            a.innerText = 'Entrou!'
        }
        function sair (){
            var a = document.getElementById('area')
            a.innerText = 'Sair!'
            a.style.background = 'green'
        }
       
     const btn = document.getElementById('btn')
     const body = document.querySelector('body')

    btn.addEventListener('click', function(){
        body.style.background = 'blue';
    })
    </script>
</body>

</html>
